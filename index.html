<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeThing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #000000;
            background-image: radial-gradient(ellipse at 50% 20%, #1f1a00 0%, #000000 60%);
            min-height: 100vh;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }

        /* ── Steps ─────────────────────────────────────────── */
        .step {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .step.active {
            display: flex;
            animation: fadeIn 0.35s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Shared card ────────────────────────────────────── */
        .card {
            background: #111111;
            border: 1px solid #2a2a2a;
            border-top: 4px solid #FFD600;
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 8px 48px rgba(0, 0, 0, 0.7),
                        0 0 0 1px rgba(255, 214, 0, 0.06);
        }

        .card h1 {
            font-size: 1.9rem;
            font-weight: 900;
            color: #FFD600;
            margin-bottom: 14px;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .card p {
            color: #888888;
            line-height: 1.7;
            margin-bottom: 32px;
            font-size: 1rem;
        }

        /* ── Button ─────────────────────────────────────────── */
        .btn {
            background: #FFD600;
            color: #000000;
            border: none;
            padding: 16px 36px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            letter-spacing: 0.01em;
        }

        .btn:active { transform: scale(0.97); background: #e6c200; }

        /* ── Step 2 — pictures ──────────────────────────────── */
        #step2 { max-width: 680px; }

        .instruction {
            color: #FFD600;
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 0.01em;
        }

        .picture-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            width: 100%;
        }

        .picture-item {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid #2a2a2a;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }

        .picture-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .picture-item .placeholder-label {
            color: #444;
            font-size: 0.85rem;
            text-align: center;
            padding: 16px;
            pointer-events: none;
        }

        /* ── Step 3 — question ──────────────────────────────── */
        #step3 { max-width: 600px; }

        .question-card {
            background: #111111;
            border: 1px solid #2a2a2a;
            border-top: 4px solid #FFD600;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            box-shadow: 0 8px 48px rgba(0, 0, 0, 0.7);
        }

        .question-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 28px;
            line-height: 1.45;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background: #1a1a1a;
            border: 2px solid #2a2a2a;
            border-radius: 8px;
            padding: 16px 20px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            font-family: inherit;
            color: #bbbbbb;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: border-color 0.2s, background 0.2s, color 0.2s;
        }

        .option:active {
            border-color: #FFD600;
            background: #1f1c00;
            color: #ffffff;
        }

        /* ── Step 4 — congrats + form ───────────────────────── */
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #666666;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #2a2a2a;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            background: #1a1a1a;
            color: #ffffff;
            transition: border-color 0.2s;
        }

        .form-group input::placeholder { color: #3a3a3a; }

        .form-group input:focus {
            outline: none;
            border-color: #FFD600;
        }

        .form-submit {
            width: 100%;
            margin-top: 12px;
        }

        /* ── Wrong-answer animation ─────────────────────────── */
        .wrong {
            border-color: #cc3344 !important;
            background: rgba(204, 51, 68, 0.12) !important;
            animation: wrong_shake 0.4s;
        }
        @keyframes wrong_shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-6px); }
            75%       { transform: translateX(6px); }
        }
        /* ── Correct-answer animation ────────────────────────── */
        .correct {
            border-color: #FFD600 !important;
            box-shadow: 0 0 24px rgba(255, 214, 0, 0.45) !important;
            animation: correct_shake 0.4s;
        }

        @keyframes correct_shake {
            0%, 100% { transform: translateY(0); }
            25%       { transform: translateY(-8px); }
            75%       { transform: translateY(8px); }
        }

        /* ── Hover effects — only on devices that have a pointer ── */
        @media (hover: hover) {
            .btn:hover {
                background: #ffe033;
                box-shadow: 0 4px 24px rgba(255, 214, 0, 0.35);
            }
            .picture-item:hover {
                border-color: #FFD600;
                box-shadow: 0 0 22px rgba(255, 214, 0, 0.22);
                transform: scale(1.02);
            }
            .option:hover {
                border-color: #FFD600;
                background: #1a1800;
                color: #ffffff;
            }
        }

        /* ── Small screens ──────────────────────────────────────── */
        @media (max-width: 480px) {
            .step          { padding: 12px; }
            .card          { padding: 32px 20px; border-radius: 12px; }
            .card h1       { font-size: 1.45rem; }
            .card p        { font-size: 0.95rem; margin-bottom: 24px; }
            .question-card { padding: 28px 16px; border-radius: 12px; }
            .question-card h2 { font-size: 1.1rem; margin-bottom: 20px; }
            .picture-grid  { gap: 10px; }
            .instruction   { font-size: 0.95rem; margin-bottom: 14px; }
        }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     Intro window
════════════════════════════════════════════════════════════ -->
<div id="step1" class="step active">
    <div class="card">
        <h1>VSTUP DO SVĚTA BEZPEČNOSTI!</h1>
        <p>Dokaž, že máš na to stát bezpečákem.</p>
        <button class="btn" onclick="goToStep(2)">Začít</button>
    </div>
</div>


<!-- ═══════════════════════════════════════════════════════════
     Picture selection window
════════════════════════════════════════════════════════════ -->
<div id="step2" class="step">
    <p class="instruction">Který z těchto obrázků představuje nebezpečný způsob práce?</p>

    <div class="picture-grid">

        <div class="picture-item" correct="false" onclick="handlePicture(this)">
            <img src="./images/img1.jpeg">
        </div>

        <div class="picture-item" correct="true" onclick="handlePicture(this)">
            <img src="./images/img2.jpeg">
        </div>

        <div class="picture-item" correct="false" onclick="handlePicture(this)">
            <img src="./images/img3.jpeg">
        </div>

        <div class="picture-item" correct="false" onclick="handlePicture(this)">
            <img src="./images/img4.jpeg">
        </div>

    </div>
</div>


<!-- ═══════════════════════════════════════════════════════════
     Question window
════════════════════════════════════════════════════════════ -->
<div id="step3" class="step">
    <div class="question-card">
        <h2>Která z následujících možností je správná?</h2>
        <div class="options">
            <button class="option" correct="false" onclick="handleOption(this)">Býlý kůň</button>
            <button class="option" correct="true"  onclick="handleOption(this)">Bílý kůň</button>
            <button class="option" correct="false" onclick="handleOption(this)">Bílí kůň</button>
            <button class="option" correct="false" onclick="handleOption(this)">Býlí kůň</button>
        </div>
    </div>
</div>


<!-- ═══════════════════════════════════════════════════════════
     Final window
════════════════════════════════════════════════════════════ -->
<div id="step4" class="step">
    <div class="card">
        <h1>Gratulujeme!</h1>
        <p>Dokázal jsi, že máš na to stát se bezpečákem.</p>

        <!-- Formspree form — sign up at formspree.io and replace YOUR_FORM_ID -->
        <form action="https://formspree.io/f/xwvnyrzk" method="POST">

            <input type="hidden" name="_next" value="https://grimmag1.github.io/Propaga-n--str-nka/?submitted=true">

            <div class="form-group">
                <label for="name">Jméno</label>
                <input id="name" type="text" name="name" placeholder="Vaše jméno" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="text" name="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Telefon</label>
                <input id="phone" type="text" name="phone" placeholder="+420 123 456 789">
            </div>

            <button type="submit" class="btn form-submit">Nastartovat svou kariéru</button>
        </form>
    </div>
</div>


<!-- ═══════════════════════════════════════════════════════════
     Thank-you window
════════════════════════════════════════════════════════════ -->
<div id="step5" class="step">
    <div class="card">
        <h1>Děkujeme!</h1>
        <p>Tvé údaje jsme přijali. Brzy se ti ozveme.</p>
    </div>
</div>


<script>
    // If returning from Formspree, skip straight to the thank-you screen
    if (new URLSearchParams(window.location.search).get('submitted') === 'true') {
        goToStep(5);
    }

    function goToStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function handlePicture(el) {
        if (el.getAttribute('correct') === 'true') {
            el.classList.add('correct');
            setTimeout(() => goToStep(3), 500);
        } else {
            el.classList.add('wrong');
            setTimeout(() => el.classList.remove('wrong'), 500);
        }
    }

    function handleOption(el) {
        if (el.getAttribute('correct') === 'true') {
            el.classList.add('correct');
            setTimeout(() => goToStep(4), 500);
        } else {
            el.classList.add('wrong');
            setTimeout(() => el.classList.remove('wrong'), 500);
        }
    }
</script>

</body>
</html>
